<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Learnix</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <span class="logo-text">Learnix</span>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="home_page.html">Home</a></li>
      </ul>
    </nav>
    <div class="nav-actions">
      <a href="/logout" class="get-started">Logout</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="transform-banner">
        <span>Account</span>
      </div>
      <h1>
        My <span class="journey">Profile</span>
      </h1>
      <div class="profile-page-card">
        <p><strong>User Name:</strong> <span id="profileName">Loading...</span></p>
        <p><strong>Email ID:</strong> <span id="profileEmail">Loading...</span></p>
        <p><strong>Role:</strong> <span id="profileRole">Loading...</span></p>
        <p><strong>Department:</strong> <span id="profileDepartment">Loading...</span></p>
        <p><strong>My Enrolled Courses:</strong></p>
        <ul id="myCoursesList"></ul>
      </div>
      <a href="/dashboard" class="get-started-free">Back to Dashboard</a>
    </section>
  </main>

  <script>
    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString();
    }

    async function loadMyCourses(user) {
      const list = document.getElementById("myCoursesList");
      list.innerHTML = "";

      if (!user || user.role !== "student") {
        const item = document.createElement("li");
        item.textContent = "Only student accounts have enrollments.";
        list.appendChild(item);
        return;
      }

      const response = await fetch("/api/my-courses");
      if (!response.ok) {
        throw new Error("Failed to load courses");
      }

      const payload = await response.json();
      const courses = Array.isArray(payload.courses) ? payload.courses : [];

      if (courses.length === 0) {
        const item = document.createElement("li");
        item.textContent = "No courses enrolled yet.";
        list.appendChild(item);
        return;
      }

      courses.forEach((course) => {
        const item = document.createElement("li");
        const link = document.createElement("a");
        link.href = `${course.video_path || "Courses.html"}?enrolled=1`;
        link.textContent = course.course_name;
        const date = formatDate(course.enrollment_date);
        if (date) {
          link.textContent += ` (Enrolled: ${date})`;
        }
        item.appendChild(link);
        list.appendChild(item);
      });
    }

    async function loadProfile() {
      try {
        const response = await fetch("/api/me");
        if (!response.ok) {
          throw new Error("Not authenticated");
        }

        const user = await response.json();
        document.getElementById("profileName").textContent = user.username || "User";
        document.getElementById("profileEmail").textContent = user.email || "";
        document.getElementById("profileRole").textContent = user.role || "";
        document.getElementById("profileDepartment").textContent = user.department || "";
        await loadMyCourses(user);
      } catch (error) {
        window.location.href = "/login.html";
      }
    }

    loadProfile();
  </script>
</body>
</html>
